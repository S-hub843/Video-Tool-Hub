<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Editor</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ================= TOOL PAGE ================= */
/* ================= TOOL PAGE ================= */
.tool-page {
  padding: 60px 80px;
  background: #050505;
}

/* LAYOUT */
.tool-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 50px;
  align-items: center;
}

/* LEFT */
.tool-left h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.tool-left p {
  color: #aaa;
  margin-bottom: 25px;
}

/* UPLOAD BOX */
.upload-box {
  display: flex;
  gap: 15px;
  align-items: center;

  background: #111;
  border: 1px solid rgba(34,197,94,0.2);
  padding: 20px;
  border-radius: 14px;
}

/* INPUT */
.upload-box input {
  color: #ccc;
}

/* BUTTON */
.upload-box button {
  background: #22c55e;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
}

/* RIGHT PREVIEW */
.preview-box {
  height: 260px;
  background: #111;
  border: 1px dashed rgba(34,197,94,0.3);
  border-radius: 16px;

  display: flex;
  align-items: center;
  justify-content: center;

  color: #777;
}

/* HOVER EFFECT */
.upload-box:hover {
  box-shadow: 0 0 20px rgba(34,197,94,0.15);
}
.preview-box video {
  width: 100%;
  height: 100%;
  object-fit: contain; /* THIS is the key */
  border-radius: 16px;
}

  </style>
</head>

      <h1>Video Compressor</h1>
      <p>Reduce file size without losing quality.</p>

      <div class="upload-box">
        <input type="file" id="fileInput">
        <button>Upload Video</button>
      </div>

    <!-- RIGHT SIDE -->
    <div class="tool-right">

      </div>
    </div>

  </div>

</section>
